<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="p-4">
<div class="container">
    <h2>Expense Tracker</h2>

    <!-- Expense Form -->
    <form id="expenseForm" class="mb-3">
        <input type="hidden" id="expenseId">
        <div class="row g-2">
            <div class="col"><input class="form-control" placeholder="Title" id="title" required></div>
            <div class="col"><input class="form-control" placeholder="Category" id="category" required></div>
            <div class="col"><input class="form-control" type="number" placeholder="Amount" id="amount" required></div>
            <div class="col"><input class="form-control" type="date" id="expenseDate" required></div>
            <div class="col"><input class="form-control" placeholder="Payment Method" id="paymentMethod" required></div>
            <div class="col"><button class="btn btn-primary w-100">Save</button></div>
        </div>
    </form>

    <!-- Search / Show All -->
    <div class="mb-3">
        <input type="text" id="searchTitle" placeholder="Search by title" class="form-control d-inline-block w-auto">
        <button id="searchBtn" class="btn btn-secondary btn-sm">Search</button>
        <button id="showAllBtn" class="btn btn-info btn-sm">Show All</button>
    </div>

    <!-- Expense Table -->
    <table class="table table-bordered" id="expenseTable">
        <thead>
            <tr>
                <th>ID</th><th>Title</th><th>Category</th><th>Amount</th><th>Date</th><th>Payment</th><th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="js/main.js"></script>
</body>
</html>
